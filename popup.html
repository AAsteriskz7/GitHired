<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GitHired Popup</title>
  <style>
    body {
      width: 200px;
      font-family: Arial, sans-serif;
      padding: 10px;
      text-align: center;
    }
    button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #d32f2f;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h3>GitHired</h3>
  <button id="clear-btn">Clear All Data</button>
  <div id="status">Data cleared!</div>
  <script src="popup.js"></script>
</body>
</html>
